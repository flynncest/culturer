<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>culturers — Your personal profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #f64d25; --bg: #f7f6f2; --border: rgba(246,77,37,0.14); }
    html, body { min-height: 100%; background: var(--bg); color: var(--accent); font-family: 'DM Sans', sans-serif; }

    .shell {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 20px 80px;
    }

    .topbar {
      width: 100%; max-width: 620px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0 0; margin-bottom: 40px;
    }
    .logo { font-family: 'Kaisei Decol', serif; font-size: 20px; color: var(--accent); text-decoration: none; }

    /* Progress */
    .progress-wrap { width: 100%; max-width: 620px; margin-bottom: 48px; }
    .progress-label { font-size: 12px; opacity: 0.42; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
    .progress-bar { height: 3px; background: rgba(246,77,37,0.12); border-radius: 2px; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

    /* Step card */
    .step-card { width: 100%; max-width: 620px; animation: fadeUp 0.32s ease forwards; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

    .step-eyebrow { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.38; margin-bottom: 14px; }
    .step-q { font-family: 'Kaisei Decol', serif; font-size: clamp(24px, 4.5vw, 36px); line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 10px; }
    .step-hint { font-size: 14px; opacity: 0.5; margin-bottom: 28px; line-height: 1.45; }

    /* Option grid — for art style & celebration */
    .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 32px; }
    .opt {
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 16px 14px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      user-select: none;
    }
    .opt:hover { border-color: rgba(246,77,37,0.4); background: rgba(246,77,37,0.03); }
    .opt.selected { border-color: var(--accent); background: rgba(246,77,37,0.07); }
    .opt:active { transform: scale(0.98); }
    .opt-icon { font-size: 22px; margin-bottom: 8px; display: block; }
    .opt-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; line-height: 1.3; }
    .opt-desc { font-size: 11px; opacity: 0.48; line-height: 1.4; }

    /* Hobby pill grid */
    .pill-grid { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 15px; border: 1.5px solid var(--border);
      border-radius: 100px; cursor: pointer; font-size: 13px;
      transition: all 0.15s; user-select: none; white-space: nowrap;
    }
    .pill:hover { border-color: rgba(246,77,37,0.4); background: rgba(246,77,37,0.03); }
    .pill.selected { border-color: var(--accent); background: rgba(246,77,37,0.08); font-weight: 500; }

    /* Other free-text */
    .other-field { display: none; margin-bottom: 28px; }
    .other-field.visible { display: block; }
    .other-input {
      width: 100%; padding: 12px 16px;
      background: transparent; border: 1.5px solid var(--border);
      border-radius: 8px; font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--accent); outline: none;
      transition: border-color 0.2s;
    }
    .other-input:focus { border-color: var(--accent); }
    .other-input::placeholder { opacity: 0.35; }

    /* Dietary pills (multi) */
    .diet-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; }
    .diet-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border: 1.5px solid var(--border);
      border-radius: 100px; cursor: pointer; font-size: 14px;
      transition: all 0.15s; user-select: none;
    }
    .diet-pill:hover { border-color: rgba(246,77,37,0.4); background: rgba(246,77,37,0.03); }
    .diet-pill.selected { border-color: var(--accent); background: rgba(246,77,37,0.08); font-weight: 500; }
    .diet-check { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid currentColor; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 9px; }
    .diet-pill.selected .diet-check { background: var(--accent); border-color: var(--accent); color: var(--bg); }
    .diet-pill.selected .diet-check::after { content: '✓'; }

    /* Buttons */
    .btn-row { display: flex; gap: 10px; }
    .btn {
      padding: 14px 32px; border-radius: 100px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      letter-spacing: 0.04em; cursor: pointer; transition: opacity 0.15s; border: none;
    }
    .btn:hover { opacity: 0.78; }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-ghost { background: transparent; color: var(--accent); border: 1.5px solid rgba(246,77,37,0.25); }
    .btn:disabled { opacity: 0.28; cursor: not-allowed; }

    /* Thank you */
    .thank-you { width: 100%; max-width: 620px; text-align: center; padding-top: 60px; animation: fadeUp 0.4s ease forwards; }
    .ty-icon { font-size: 52px; margin-bottom: 24px; }
    .ty-h { font-family: 'Kaisei Decol', serif; font-size: clamp(28px, 5vw, 46px); line-height: 1.05; letter-spacing: -0.025em; margin-bottom: 16px; }
    .ty-p { font-size: 16px; opacity: 0.55; line-height: 1.6; max-width: 40ch; margin: 0 auto; }

    .invalid-wrap { width: 100%; max-width: 620px; text-align: center; padding-top: 80px; }
    .invalid-wrap h2 { font-family: 'Kaisei Decol', serif; font-size: 32px; margin-bottom: 12px; }
    .invalid-wrap p { font-size: 15px; opacity: 0.5; }

    @media (max-width: 480px) {
      .opt-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a class="logo" href="index.html">culturers</a>
  </div>
  <div class="progress-wrap" id="progressWrap" style="display:none;">
    <div class="progress-label" id="progressLabel">Step 1 of 4</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:25%"></div></div>
  </div>
  <div id="quizContent"></div>
</div>

<script>
  const DB = {
    getPeople: () => JSON.parse(localStorage.getItem('cult_people') || '[]'),
    setPeople: v => localStorage.setItem('cult_people', JSON.stringify(v)),
  };

  const params = new URLSearchParams(window.location.search);
  const personId = params.get('id');

  // ─────────────────────────────────────────────
  // STEP DEFINITIONS
  // ─────────────────────────────────────────────
  const STEPS = [

    // ── Step 1: Art style (10 choices) ──
    {
      key: 'artStyle',
      eyebrow: 'Step 1 — Your visual style',
      q: 'Which visual style\nspeaks to you?',
      hint: 'We use this to craft your personalised AI greeting card.',
      type: 'single',
      opts: [
        { value: 'minimal-nordic',  icon: '◻',  name: 'Minimal & Nordic',     desc: 'Clean lines, white space, Scandinavian calm' },
        { value: 'bold-maximalist', icon: '🌈', name: 'Bold & Maximalist',     desc: 'Vivid colours, pattern, big energy' },
        { value: 'natural-botanic', icon: '🌿', name: 'Natural & Botanical',   desc: 'Earth tones, plants, organic textures' },
        { value: 'retro-vintage',   icon: '📷', name: 'Retro & Vintage',       desc: '70s/80s nostalgia, warm film tones' },
        { value: 'dreamy-soft',     icon: '🎨', name: 'Dreamy & Watercolour',  desc: 'Soft pastels, painterly, impressionistic' },
        { value: 'urban-street',    icon: '🏙', name: 'Urban & Street',        desc: 'Raw, edgy, city textures, graffiti' },
        { value: 'elegant-luxury',  icon: '✨', name: 'Elegant & Luxury',      desc: 'Gold accents, dark tones, refined' },
        { value: 'playful-cartoon', icon: '🎭', name: 'Playful & Illustrated', desc: 'Fun, character-driven, cartoon warmth' },
        { value: 'geometric',       icon: '📐', name: 'Geometric & Abstract',  desc: 'Shapes, patterns, contemporary art' },
        { value: 'dark-cinematic',  icon: '🎬', name: 'Dark & Cinematic',      desc: 'Dramatic lighting, moody, deep tones' },
      ],
    },

    // ── Step 2: Hobby (20 pills + Other) ──
    {
      key: 'hobby',
      eyebrow: 'Step 2 — Your passion',
      q: 'What do you love\ndoing in your spare time?',
      hint: 'Pick everything that applies — we use this to find you the perfect interest voucher.',
      type: 'hobby',
      pills: [
        { value: 'travel',      label: '✈️  Travel & adventure' },
        { value: 'hiking',      label: '🏔  Hiking & outdoors' },
        { value: 'photography', label: '📸  Photography' },
        { value: 'painting',    label: '🎨  Drawing & painting' },
        { value: 'music-listen',label: '🎵  Listening to music' },
        { value: 'music-play',  label: '🎸  Playing music' },
        { value: 'gym',         label: '🏋️  Gym & fitness' },
        { value: 'running',     label: '🏃  Running & cycling' },
        { value: 'yoga',        label: '🧘  Yoga & wellness' },
        { value: 'cooking',     label: '🍳  Cooking & baking' },
        { value: 'wine-dining', label: '🍷  Wine & fine dining' },
        { value: 'reading',     label: '📚  Books & reading' },
        { value: 'gaming',      label: '🎮  Gaming' },
        { value: 'film',        label: '🎬  Film & TV' },
        { value: 'plants',      label: '🌿  Gardening & plants' },
        { value: 'pets',        label: '🐾  Pets & animals' },
        { value: 'surfing',     label: '🏄  Watersports & snow' },
        { value: 'theatre',     label: '🎭  Theatre & live events' },
        { value: 'crafting',    label: '🧵  Crafting & DIY' },
        { value: 'tech',        label: '💻  Tech & gadgets' },
      ],
    },

    // ── Step 3: Celebration style ──
    {
      key: 'celebStyle',
      eyebrow: 'Step 3 — How you love to be celebrated',
      q: 'When someone goes\nout of their way for you,\nwhat matters most?',
      hint: 'This shapes how we frame every moment we create for you.',
      type: 'single',
      opts: [
        { value: 'surprise',   icon: '🎁', name: 'A surprise I didn\'t see coming',  desc: 'Unexpected is always the best' },
        { value: 'message',    icon: '💌', name: 'A heartfelt personal message',      desc: 'The words behind it mean everything' },
        { value: 'family',     icon: '👨‍👩‍👧', name: 'Something I can share with family',desc: 'The best moments are shared ones' },
        { value: 'experience', icon: '🍽️', name: 'An experience over a thing',       desc: 'Memories outlast any object' },
        { value: 'public',     icon: '🏆', name: 'Recognition in front of the team', desc: 'Being seen publicly matters to me' },
        { value: 'private',    icon: '🤫', name: 'Quiet and private, just for me',   desc: 'Intimate over public, always' },
        { value: 'creative',   icon: '🎨', name: 'Something creative & unique',      desc: 'Originality shows real thought' },
        { value: 'quality',    icon: '💎', name: 'Quality that shows real thought',  desc: 'Better one perfect thing than many average ones' },
      ],
    },

    // ── Step 4: Dietary (multi, moved last) ──
    {
      key: 'allergies',
      eyebrow: 'Step 4 — Your cake',
      q: 'Any dietary needs\nwe should know about?',
      hint: 'Select all that apply so we can make your handmade cake perfect for you.',
      type: 'dietary',
      pills: [
        { value: 'none',    icon: '🎂', label: 'No restrictions' },
        { value: 'lactose', icon: '🥛', label: 'Lactose-free' },
        { value: 'nuts',    icon: '🥜', label: 'Nut-free' },
        { value: 'gluten',  icon: '🌾', label: 'Gluten-free' },
        { value: 'vegan',   icon: '🌱', label: 'Vegan' },
        { value: 'halal',   icon: '☪️',  label: 'Halal' },
        { value: 'kosher',  icon: '✡️',  label: 'Kosher' },
        { value: 'other',   icon: '✏️', label: 'Other' },
      ],
    },
  ];

  // ─────────────────────────────────────────────
  // STATE
  // ─────────────────────────────────────────────
  let person = null;
  let step = 0;
  let answers = { artStyle: null, hobby: [], hobbyOther: '', celebStyle: null, allergies: [] };

  // ─────────────────────────────────────────────
  // INIT
  // ─────────────────────────────────────────────
  const isPreview = !personId || personId === 'preview';

  function init() {
    const people = DB.getPeople();
    person = personId ? (people.find(p => p.id === personId) || null) : null;

    if (!isPreview && !person) {
      // Valid-looking ID but not found in this browser — still show quiz
      // (it will save to fallback key on submit)
    }

    if (person && person.quizDone) {
      answers.artStyle   = person.artStyle   || null;
      answers.hobby      = person.hobby      || [];
      answers.hobbyOther = person.hobbyOther || '';
      answers.celebStyle = person.celebStyle || null;
      answers.allergies  = person.allergies  || [];
    }
    document.getElementById('progressWrap').style.display = 'block';
    renderStep();
  }

  // ─────────────────────────────────────────────
  // RENDER
  // ─────────────────────────────────────────────
  function renderStep() {
    const s = STEPS[step];
    const pct = ((step + 1) / STEPS.length) * 100;
    document.getElementById('progressLabel').textContent = `Step ${step + 1} of ${STEPS.length}`;
    document.getElementById('progressFill').style.width = pct + '%';

    const firstName = person ? (person.first || person.name || 'there') : 'there';
    const greeting = step === 0
      ? `${isPreview ? '<div style="display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(246,77,37,0.08);border-radius:100px;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:16px;">Preview mode</div>' : ''}
         <p style="font-size:16px;opacity:0.52;line-height:1.5;margin-bottom:32px;">Hi <strong>${isPreview ? 'there' : firstName}</strong> 👋 &nbsp;This takes 60 seconds and helps us make every moment feel genuinely personal to you.</p>`
      : '';

    const qLines = s.q.split('\n').join('<br>');
    let bodyHTML = '';

    if (s.type === 'single') {
      bodyHTML = `<div class="opt-grid">
        ${s.opts.map(o => `
          <div class="opt${answers[s.key] === o.value ? ' selected' : ''}" onclick="selectSingle('${s.key}','${o.value}',this)">
            <span class="opt-icon">${o.icon}</span>
            <div class="opt-name">${o.name}</div>
            ${o.desc ? `<div class="opt-desc">${o.desc}</div>` : ''}
          </div>`).join('')}
      </div>`;

    } else if (s.type === 'hobby') {
      const otherSelected = answers.hobbyOther.length > 0 || answers.hobby.includes('other');
      bodyHTML = `<div class="pill-grid" id="hobbyPills">
        ${s.pills.map(p => `
          <div class="pill${answers.hobby.includes(p.value) ? ' selected' : ''}" onclick="toggleHobbyPill('${p.value}',this)">${p.label}</div>`).join('')}
        <div class="pill${otherSelected ? ' selected' : ''}" id="hobbyOtherPill" onclick="toggleOtherPill(this)">✏️ Other</div>
      </div>
      <div class="other-field${otherSelected ? ' visible' : ''}" id="hobbyOtherField">
        <input class="other-input" id="hobbyOtherInput" type="text" placeholder="Type your hobby…" value="${answers.hobbyOther}" oninput="answers.hobbyOther=this.value;refreshNext()">
      </div>`;

    } else if (s.type === 'dietary') {
      bodyHTML = `<div class="diet-grid">
        ${s.pills.map(p => `
          <div class="diet-pill${answers.allergies.includes(p.value) ? ' selected' : ''}" onclick="toggleDiet('${p.value}',this)">
            <span>${p.icon}</span><span>${p.label}</span>
            <span class="diet-check"></span>
          </div>`).join('')}
      </div>`;
    }

    const isLast = step === STEPS.length - 1;

    document.getElementById('quizContent').innerHTML = `
      <div class="step-card">
        ${greeting}
        <div class="step-eyebrow">${s.eyebrow}</div>
        <div class="step-q">${qLines}</div>
        <div class="step-hint">${s.hint}</div>
        ${bodyHTML}
        <div class="btn-row">
          ${step > 0 ? `<button class="btn btn-ghost" onclick="prevStep()">← Back</button>` : ''}
          <button class="btn btn-primary" id="btnNext" onclick="${isLast ? 'submitQuiz()' : 'nextStep()'}"
            ${canProceed() ? '' : 'disabled'}>
            ${isLast ? 'Submit →' : 'Next →'}
          </button>
        </div>
      </div>`;
  }

  function canProceed() {
    const s = STEPS[step];
    if (s.type === 'single')  return answers[s.key] !== null;
    if (s.type === 'hobby')   return answers.hobby.length > 0 || answers.hobbyOther.trim().length > 0;
    if (s.type === 'dietary') return answers.allergies.length > 0;
    return true;
  }

  function refreshNext() {
    const btn = document.getElementById('btnNext');
    if (btn) btn.disabled = !canProceed();
  }

  // ─────────────────────────────────────────────
  // INTERACTIONS
  // ─────────────────────────────────────────────
  function selectSingle(key, value, el) {
    answers[key] = value;
    document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    refreshNext();
  }

  function toggleHobbyPill(value, el) {
    const idx = answers.hobby.indexOf(value);
    if (idx === -1) answers.hobby.push(value);
    else answers.hobby.splice(idx, 1);
    el.classList.toggle('selected', answers.hobby.includes(value));
    refreshNext();
  }

  function toggleOtherPill(el) {
    const field = document.getElementById('hobbyOtherField');
    const isOpen = field.classList.contains('visible');
    if (isOpen) {
      field.classList.remove('visible');
      answers.hobbyOther = '';
      el.classList.remove('selected');
    } else {
      field.classList.add('visible');
      el.classList.add('selected');
      document.getElementById('hobbyOtherInput').focus();
    }
    refreshNext();
  }

  function toggleDiet(value, el) {
    if (value === 'none') {
      answers.allergies = ['none'];
      document.querySelectorAll('.diet-pill').forEach(p => p.classList.remove('selected'));
      el.classList.add('selected');
    } else {
      answers.allergies = answers.allergies.filter(v => v !== 'none');
      document.querySelector('.diet-pill[onclick*="\'none\'"]')?.classList.remove('selected');
      const idx = answers.allergies.indexOf(value);
      if (idx === -1) answers.allergies.push(value);
      else answers.allergies.splice(idx, 1);
      el.classList.toggle('selected', answers.allergies.includes(value));
    }
    refreshNext();
  }

  // ─────────────────────────────────────────────
  // NAV
  // ─────────────────────────────────────────────
  function nextStep() {
    if (!canProceed()) return;
    step++;
    renderStep();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function prevStep() {
    step--;
    renderStep();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ─────────────────────────────────────────────
  // SUBMIT — saves back to cult_people localStorage
  // ─────────────────────────────────────────────
  function submitQuiz() {
    if (!canProceed()) return;

    if (isPreview) {
      document.getElementById('progressWrap').style.display = 'none';
      document.getElementById('quizContent').innerHTML = `
        <div class="thank-you">
          <div class="ty-icon">👀</div>
          <div class="ty-h">Preview complete.</div>
          <p class="ty-p">This was a preview of the quiz. Employees will see the same flow with their name personalised and their answers saved to the dashboard.</p>
        </div>`;
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }

    const quizData = {
      artStyle:    answers.artStyle,
      hobby:       answers.hobby,
      hobbyOther:  answers.hobbyOther.trim(),
      celebStyle:  answers.celebStyle,
      allergies:   answers.allergies,
      quizDone:    true,
      quizDate:    new Date().toISOString(),
    };

    const people = DB.getPeople();
    const idx = people.findIndex(p => p.id === personId);
    if (idx !== -1) {
      people[idx] = { ...people[idx], ...quizData };
      DB.setPeople(people);
    } else {
      localStorage.setItem('cult_quiz_' + personId, JSON.stringify(quizData));
    }

    const firstName = person ? (person.first || person.name || '') : '';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('quizContent').innerHTML = `
      <div class="thank-you">
        <div class="ty-icon">🎂</div>
        <div class="ty-h">You're all set${firstName ? ', ' + firstName : ''}.</div>
        <p class="ty-p">Every moment we create for you will be built around who you actually are. We can't wait to surprise you.</p>
      </div>`;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  init();
</script>
</body>
</html>
